<svg
  width="360"
  height="96"
  viewBox="132 28 268 84"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Golem.mx Logo</title>
  <desc id="desc">Modern wordmark logo with the text Golem.mx on transparent background</desc>

  <defs>
    <linearGradient id="golemGradient" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#12100d"/>
      <stop offset="50%" stop-color="#12100d"/>
      <stop offset="100%" stop-color="#12100d"/>
    </linearGradient>

    <clipPath id="textClip">
      <rect x="136" y="32" width="272" height="72" rx="4"/>
    </clipPath>
  </defs>

  <text
    x="140"
    y="96"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="58"
    font-weight="800"
    letter-spacing="-2.6"
    fill="#12100d"
    clip-path="url(#textClip)"
  >
    Golem<tspan fill="#12100d" font-weight="700">.mx</tspan>
  </text>
</svg>
